    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-zinc-950 text-white selection:bg-white selection:text-black overflow-x-hidden">
    
    <div class="custom-cursor" id="cursor"></div>

    <nav class="fixed top-0 w-full p-6 md:px-12 flex justify-between items-center z-[70] backdrop-blur-md bg-black/20 border-b border-white/5">
        <a href="index.html" class="flex items-center">
            <img src="rrr.png" alt="Rashi Goenka Logo" class="h-8 md:h-10 w-auto object-contain">

            <a href="contact.html" class="text-5xl font-black uppercase tracking-tighter text-zinc-500">Contact</a>
        </div>

    <main class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-20">
        <div class="reveal-text">
            <h1 class="text-6xl md:text-8xl lg:text-9xl font-black tracking-tighter mb-6 md:mb-10 uppercase">

            <a href="mailto:rashigoenka27@gmail.com" 
               class="text-lg md:text-4xl lg:text-5xl font-bold underline decoration-zinc-800 hover:text-zinc-500 transition break-all block max-w-4xl mx-auto">
               rashigoenka27@gmail.com
            </a>

            <div class="mt-12 md:mt-20 flex flex-wrap justify-center gap-6 md:gap-10">
                <a href="https://www.behance.net/rashigoenka" target="_blank" class="font-bold text-zinc-500 hover:text-white tracking-widest text-sm md:text-base transition">BEHANCE</a>

    <footer class="bg-black py-12 px-6 md:px-12 border-t border-white/10">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 text-zinc-600 font-mono text-[10px] md:text-xs uppercase tracking-widest">

            <div class="flex gap-6">

            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // MOBILE MENU LOGIC
        const menuToggle = document.getElementById('menu-toggle');
        const closeMenu = document.getElementById('close-menu');
        const mobileMenu = document.getElementById('mobile-menu');

        menuToggle.onclick = () => mobileMenu.style.transform = 'translateX(0)';
        closeMenu.onclick = () => mobileMenu.style.transform = 'translateX(100%)';

        // GSAP ENTRANCE
        gsap.from(".reveal-text", {
            y: 50,
            opacity: 0,
            duration: 1.5,
            ease: "expo.out",
            delay: 0.2
        });
    </script>
</body>
</html>
